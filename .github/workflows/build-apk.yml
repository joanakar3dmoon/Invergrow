name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Grant execute permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/gradle.log
        shell: bash

      - name: Show error summary
        if: failure()
        run: grep -E "error:|ERROR|Exception|Caused by|FAILURE" /tmp/gradle.log | head -40 || cat /tmp/gradle.log | tail -50

      - name: Find APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null | head -20

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: invergrow-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

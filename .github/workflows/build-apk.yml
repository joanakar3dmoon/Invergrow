name: Build APK
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Create local.properties
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > android/local.properties

      - name: Grant execute permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk invergrow-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: InverGrow Debug APK
          body: APK debug compilada automaticamente
          files: invergrow-debug.apk
          prerelease: true
          make_latest: false

name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x android/gradlew

      - name: Show ANDROID_HOME
        run: echo "ANDROID_HOME=$ANDROID_HOME" && ls $ANDROID_HOME/build-tools/ || echo "No build-tools"

      - name: Build debug APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon -PANDROID_HOME=/usr/local/lib/android/sdk 2>&1

      - name: Find APK
        if: always()
        run: find /home/runner /github -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: invergrow-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
